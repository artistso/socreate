<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoCreate - Professional 2D Animation & Drawing</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%23FF6B35'/><stop offset='50%25' style='stop-color:%239B59B6'/><stop offset='100%25' style='stop-color:%234ECDC4'/></linearGradient></defs><rect fill='url(%23g)' width='100' height='100' rx='20'/><text x='50' y='75' text-anchor='middle' fill='white' font-size='60' font-weight='bold' font-family='Arial'>C</text><text x='50' y='35' text-anchor='middle' fill='white' font-size='14' font-weight='bold' font-family='Arial'>so</text></svg>">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-panel: rgba(25, 25, 25, 0.95);
            --bg-btn: rgba(45, 45, 45, 0.9);
            --bg-btn-hover: rgba(60, 60, 60, 0.95);
            --bg-input: rgba(35, 35, 35, 0.9);
            --accent: #FF6B35;
            --accent2: #4ECDC4;
            --accent3: #9B59B6;
            --text: #f0f0f0;
            --text-dim: #888;
            --border: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.5);
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
            touch-action: none;
            user-select: none;
        }
        #canvas {
            position: fixed; top: 0; left: 0;
            background: #fff;
            z-index: 1;
            cursor: crosshair;
            touch-action: none;
        }
        /* Floating UI */
        .fab {
            position: fixed;
            width: 48px; height: 48px;
            background: var(--bg-btn);
            border-radius: 14px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: grab; pointer-events: auto;
            transition: transform 0.15s ease, background 0.15s ease;
            box-shadow: 0 2px 12px var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            z-index: 100;
        }
        .fab:hover { background: var(--bg-btn-hover); transform: scale(1.05); }
        .fab.active { background: var(--accent); }
        .fab .icon { font-size: 20px; line-height: 1; }
        .fab .label { font-size: 8px; color: var(--text-dim); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
        .fab.active .label { color: rgba(255,255,255,0.9); }
        /* Panels */
        .panel {
            position: fixed;
            background: var(--bg-panel);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px var(--shadow);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            pointer-events: auto;
            display: none;
            z-index: 200;
            min-width: 240px;
            max-height: 80vh;
            overflow: hidden;
            animation: popIn 0.2s ease;
        }
        .panel.open { display: flex; flex-direction: column; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }
        .panel-header h3 { font-size: 13px; font-weight: 600; }
        .panel-close {
            background: none; border: none; color: var(--text-dim);
            font-size: 18px; cursor: pointer; padding: 2px 8px; border-radius: 50%;
            transition: all 0.15s;
        }
        .panel-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .panel-body { padding: 12px; overflow-y: auto; max-height: 70vh; }
        .panel-body::-webkit-scrollbar { width: 6px; }
        .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        /* Brush Grid */
        .brush-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
        .brush-item {
            aspect-ratio: 1; background: rgba(255,255,255,0.05);
            border-radius: 10px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.15s; border: 2px solid transparent; padding: 4px;
        }
        .brush-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .brush-item.active { border-color: var(--accent); background: rgba(255,107,53,0.15); }
        .brush-item .b-icon { font-size: 18px; }
        .brush-item .b-name { font-size: 9px; color: var(--text-dim); margin-top: 2px; text-align: center; }
        .brush-item.active .b-name { color: var(--accent); }
        /* Form Controls */
        .ctrl-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .ctrl-row label { font-size: 11px; color: var(--text-dim); min-width: 60px; }
        .ctrl-row input[type="range"] {
            flex: 1; height: 4px; -webkit-appearance: none;
            background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
        }
        .ctrl-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
        }
        .ctrl-row .val { font-size: 11px; color: #fff; min-width: 24px; text-align: right; }
        /* Layers */
        .layer-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; margin-bottom: 4px;
            background: rgba(255,255,255,0.04); border-radius: 8px;
            cursor: pointer; transition: all 0.15s;
        }
        .layer-item:hover { background: rgba(255,255,255,0.08); }
        .layer-item.active { background: rgba(255,107,53,0.12); border-left: 3px solid var(--accent); }
        .layer-swatch {
            width: 24px; height: 24px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0;
        }
        .layer-info { flex: 1; min-width: 0; }
        .layer-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .layer-opacity { font-size: 9px; color: var(--text-dim); }
        .layer-btns { display: flex; gap: 4px; }
        .layer-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; padding: 3px; border-radius: 4px; font-size: 13px;
            transition: all 0.15s;
        }
        .layer-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .layer-btn.vis { color: var(--accent2); }
        .add-btn {
            width: 100%; padding: 8px; background: var(--accent);
            border: none; border-radius: 8px; color: #fff; font-size: 12px;
            font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s;
        }
        .add-btn:hover { opacity: 0.85; }
        /* Timeline */
        .tl-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tl-btn {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: #fff;
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
            transition: all 0.15s;
        }
        .tl-btn:hover { background: rgba(255,255,255,0.15); }
        .tl-btn.active { background: var(--accent2); border-color: var(--accent2); }
        .tl-fps {
            display: flex; align-items: center; gap: 4px; margin-left: auto;
        }
        .tl-fps label { font-size: 10px; color: var(--text-dim); }
        .tl-fps input {
            width: 36px; background: var(--bg-input); border: 1px solid var(--border);
            color: #fff; padding: 3px 4px; border-radius: 4px; font-size: 10px; text-align: center;
        }
        .frames-row {
            display: flex; gap: 3px; overflow-x: auto; padding: 8px 0;
        }
        .frame-cell {
            min-width: 50px; height: 38px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s; position: relative; flex-shrink: 0;
            font-size: 10px; color: var(--text-dim);
        }
        .frame-cell:hover { border-color: var(--accent2); background: rgba(78,205,196,0.08); }
        .frame-cell.active { border-color: var(--accent2); background: rgba(78,205,196,0.15); color: #fff; }
        .frame-cell.keyframe::before {
            content: '🔑'; position: absolute; top: -6px; right: -4px; font-size: 9px;
        }
        .frame-cell canvas { border-radius: 4px; max-width: 100%; max-height: 100%; }
        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .gallery-item {
            background: rgba(255,255,255,0.04); border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: all 0.15s;
        }
        .gallery-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); }
        .gallery-thumb { width: 100%; height: 80px; background: #222; }
        .gallery-thumb canvas { width: 100%; height: 100%; }
        .gallery-meta { padding: 6px; }
        .gallery-meta .name { font-size: 11px; font-weight: 500; }
        .gallery-meta .info { font-size: 9px; color: var(--text-dim); }
        .new-canvas-btn {
            width: 100%; padding: 10px; background: var(--accent);
            border: none; border-radius: 8px; color: #fff; font-size: 13px;
            font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s;
        }
        .new-canvas-btn:hover { opacity: 0.85; }
        /* Settings */
        .settings-group { margin-bottom: 14px; }
        .settings-group h4 {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-dim); margin-bottom: 6px;
        }
        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 0;
        }
        .settings-row label { font-size: 12px; }
        .settings-row input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: var(--accent);
        }
        .settings-row input[type="color"] {
            width: 36px; height: 28px; border: none; border-radius: 6px;
            background: none; cursor: pointer; padding: 0;
        }
        .export-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .export-btn {
            padding: 6px 12px; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 6px; color: #fff; font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .export-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }
        /* Color Picker */
        .color-fab {
            position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px;
            border-radius: 50%; border: 3px solid var(--accent);
            cursor: pointer; z-index: 100; box-shadow: 0 4px 16px var(--shadow);
            transition: transform 0.15s;
        }
        .color-fab:hover { transform: scale(1.1); }
        .color-panel {
            position: fixed; bottom: 80px; right: 20px;
            background: var(--bg-panel); border-radius: var(--radius); padding: 12px;
            display: none; gap: 8px; z-index: 200; border: 1px solid var(--border);
            backdrop-filter: blur(16px); width: 220px;
        }
        .color-panel.open { display: flex; flex-direction: column; }
        .color-preview {
            width: 100%; height: 40px; border-radius: 8px; border: 1px solid var(--border);
            cursor: pointer;
        }
        .color-input-row { display: flex; gap: 6px; align-items: center; }
        .color-input-row input[type="color"] {
            width: 36px; height: 36px; border: none; border-radius: 6px;
            background: none; cursor: pointer; padding: 0;
        }
        .color-hex {
            flex: 1; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; color: #fff; font-size: 12px;
            font-family: monospace; outline: none;
        }
        .recent-colors { display: flex; gap: 4px; flex-wrap: wrap; }
        .recent-swatch {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12);
            cursor: pointer; transition: transform 0.15s;
        }
        .recent-swatch:hover { transform: scale(1.2); }
        /* Symmetry Bar */
        .sym-bar {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            background: var(--bg-panel); border-radius: 12px; padding: 6px 8px;
            display: none; gap: 4px; z-index: 200; border: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
        .sym-bar.open { display: flex; }
        .sym-btn {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer;
            font-size: 10px; transition: all 0.15s;
        }
        .sym-btn:hover { background: rgba(255,255,255,0.12); }
        .sym-btn.active { background: var(--accent3); border-color: var(--accent3); }
        /* Toast */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px;
            border-radius: 8px; font-size: 12px; z-index: 9999;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            backdrop-filter: blur(8px);
        }
        #toast.show { opacity: 1; }
        /* Loading */
        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.5s; flex-direction: column; gap: 16px;
        }
        #loading.hide { opacity: 0; pointer-events: none; }
        .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 14px; color: var(--text-dim); }
        /* Status Bar */
        #status-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15,15,15,0.9); padding: 4px 12px;
            font-size: 10px; color: var(--text-dim); z-index: 150;
            display: flex; justify-content: space-between;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div class="loader-text">SoCreate</div></div>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="fab" id="btn-brushes" style="top:12px;left:12px"><span class="icon">🖌️</span><span class="label">Brushes</span></div>
        <div class="fab" id="btn-layers" style="top:72px;left:12px"><span class="icon">📑</span><span class="label">Layers</span></div>
        <div class="fab" id="btn-symmetry" style="top:132px;left:12px"><span class="icon">🔄</span><span class="label">Symmetry</span></div>
        <div class="fab" id="btn-timeline" style="top:12px;right:12px"><span class="icon">🎬</span><span class="label">Timeline</span></div>
        <div class="fab" id="btn-gallery" style="top:72px;right:12px"><span class="icon">📁</span><span class="label">Gallery</span></div>
        <div class="fab" id="btn-settings" style="top:132px;right:12px"><span class="icon">⚙️</span><span class="label">Settings</span></div>
        <div class="fab" id="btn-onion" style="top:192px;right:12px"><span class="icon">👁️</span><span class="label">Onion</span></div>
        <div class="fab" id="btn-undo" style="bottom:32px;left:12px"><span class="icon">↩️</span><span class="label">Undo</span></div>
        <div class="fab" id="btn-redo" style="bottom:92px;left:12px"><span class="icon">↪️</span><span class="label">Redo</span></div>
        <div class="fab" id="btn-new" style="bottom:32px;right:12px"><span class="icon">➕</span><span class="label">New</span></div>
    </div>
    <div id="panels">
        <div class="panel" id="panel-brushes" style="left:12px;top:70px;width:280px">
            <div class="panel-header"><h3>Brushes</h3><button class="panel-close" data-close="brushes">×</button></div>
            <div class="panel-body">
                <div class="brush-grid" id="brush-grid"></div>
                <div class="ctrl-row"><label>Size</label><input type="range" id="b-size" min="1" max="100" value="12"><span class="val" id="b-size-v">12</span></div>
                <div class="ctrl-row"><label>Opacity</label><input type="range" id="b-opacity" min="1" max="100" value="100"><span class="val" id="b-opacity-v">100</span></div>
                <div class="ctrl-row"><label>Hardness</label><input type="range" id="b-hardness" min="0" max="100" value="100"><span class="val" id="b-hardness-v">100</span></div>
            </div>
        </div>
        <div class="panel" id="panel-layers" style="left:12px;top:140px;width:260px">
            <div class="panel-header"><h3>Layers</h3><button class="panel-close" data-close="layers">×</button></div>
            <div class="panel-body">
                <div id="layers-list"></div>
                <button class="add-btn" id="add-layer">+ Add Layer</button>
            </div>
        </div>
        <div class="panel" id="panel-timeline" style="right:12px;top:70px;width:450px">
            <div class="panel-header">
                <h3>Timeline</h3>
                <div class="tl-header">
                    <button class="tl-btn" id="tl-play">▶</button>
                    <button class="tl-btn" id="tl-pause">⏸</button>
                    <button class="tl-btn" id="tl-stop">⏹</button>
                    <button class="tl-btn" id="tl-add-frame">+ Frame</button>
                    <button class="tl-btn" id="tl-keyframe">🔑 Key</button>
                    <div class="tl-fps"><label>FPS</label><input type="number" id="tl-fps" min="1" max="60" value="12"></div>
                </div>
            </div>
            <div class="panel-body">
                <div class="frames-row" id="frames-row"></div>
            </div>
        </div>
        <div class="panel" id="panel-gallery" style="right:12px;top:140px;width:300px">
            <div class="panel-header"><h3>Gallery</h3><button class="panel-close" data-close="gallery">×</button></div>
            <div class="panel-body">
                <button class="new-canvas-btn" id="new-canvas">+ New Canvas</button>
                <div class="gallery-grid" id="gallery-list"></div>
            </div>
        </div>
        <div class="panel" id="panel-settings" style="right:12px;top:200px;width:280px">
            <div class="panel-header"><h3>Settings</h3><button class="panel-close" data-close="settings">×</button></div>
            <div class="panel-body">
                <div class="settings-group">
                    <h4>Input</h4>
                    <div class="settings-row"><label>Pen Only</label><input type="checkbox" id="s-pen"></div>
                    <div class="settings-row"><label>Low Latency</label><input type="checkbox" id="s-latency" checked></div>
                </div>
                <div class="settings-group">
                    <h4>Export</h4>
                    <div class="export-btns">
                        <button class="export-btn" id="exp-png">PNG</button>
                        <button class="export-btn" id="exp-jpg">JPEG</button>
                        <button class="export-btn" id="exp-gif">GIF</button>
                    </div>
                </div>
                <div class="settings-group">
                    <h4>Canvas</h4>
                    <div class="settings-row"><label>Background</label><input type="color" id="s-bg" value="#ffffff"></div>
                    <div class="settings-row"><label>Size</label><span style="font-size:11px;color:var(--text-dim)" id="s-size"></span></div>
                </div>
            </div>
        </div>
        <div class="panel" id="panel-onion" style="right:12px;top:260px;width:240px">
            <div class="panel-header"><h3>Onion Skin</h3><button class="panel-close" data-close="onion">×</button></div>
            <div class="panel-body">
                <div class="ctrl-row"><label>Previous</label><input type="range" id="o-prev" min="0" max="10" value="3"><span class="val" id="o-prev-v">3</span></div>
                <div class="ctrl-row"><label>Next</label><input type="range" id="o-next" min="0" max="10" value="0"><span class="val" id="o-next-v">0</span></div>
                <div class="ctrl-row"><label>Opacity</label><input type="range" id="o-opacity" min="5" max="80" value="30"><span class="val" id="o-opacity-v">30</span></div>
            </div>
        </div>
    </div>
    <div class="sym-bar" id="sym-bar">
        <button class="sym-btn active" data-sym="none">None</button>
        <button class="sym-btn" data-sym="h">H</button>
        <button class="sym-btn" data-sym="v">V</button>
        <button class="sym-btn" data-sym="quad">Quad</button>
        <button class="sym-btn" data-sym="rad4">Rad 4</button>
        <button class="sym-btn" data-sym="rad6">Rad 6</button>
        <button class="sym-btn" data-sym="rad8">Rad 8</button>
        <button class="sym-btn" data-sym="mandala">Mandala</button>
    </div>
    <div class="color-fab" id="color-fab" style="background:#000"></div>
    <div class="color-panel" id="color-panel">
        <div class="color-preview" id="color-preview" style="background:#000"></div>
        <div class="color-input-row">
            <input type="color" id="color-input" value="#000000">
            <input type="text" class="color-hex" id="color-hex" value="#000000" maxlength="7">
        </div>
        <div class="recent-colors" id="recent-colors"></div>
    </div>
    <div id="toast"></div>
    <div id="status-bar">
        <span id="status-left">Ready</span>
        <span id="status-right">SoCreate v1.0</span>
    </div>

    <script>
    // ===== SoCreate Web =====
    const App = {
        // State
        state: {
            canvas: { bg: '#fff' },
            brush: { type: 'pencil', size: 12, opacity: 100, hardness: 100, color: '#000' },
            symmetry: 'none',
            layers: [],
            activeLayer: null,
            timeline: { frames: [], current: 0, fps: 12, playing: false },
            undo: [], redo: [],
            gallery: [],
            onion: { prev: 3, next: 0, opacity: 30 },
            settings: { penOnly: false, lowLatency: true },
            recentColors: ['#000','#fff','#FF6B35','#4ECDC4','#9B59B6','#E74C3C','#2ECC71','#3498DB'],
            isDrawing: false,
            stroke: []
        },
        
        // Brush Definitions
        brushes: {
            pencil:  { icon: '✏️', name: 'Pencil',  mode: 'source-over', hardness: 100 },
            pen:     { icon: '🖊️', name: 'Pen',     mode: 'source-over', hardness: 100 },
            marker:  { icon: '🖍️', name: 'Marker',  mode: 'source-over', hardness: 80 },
            brush:   { icon: '🎨', name: 'Brush',   mode: 'source-over', hardness: 40 },
            airbrush:{ icon: '💨', name: 'Airbrush',mode: 'source-over', hardness: 0 },
            eraser:  { icon: '🧹', name: 'Eraser',  mode: 'destination-out' },
            smudge:  { icon: '👆', name: 'Smudge',  mode: 'source-over' },
            blur:    { icon: '🌫️', name: 'Blur',    mode: 'source-over' },
            sharp:   { icon: '🔪', name: 'Sharpen', mode: 'source-over' },
            clone:   { icon: '📋', name: 'Clone',   mode: 'source-over' },
            heal:    { icon: '🩹', name: 'Heal',    mode: 'source-over' },
            dodge:   { icon: '☀️', name: 'Dodge',   mode: 'lighten' },
            burn:    { icon: '🔥', name: 'Burn',    mode: 'darken' },
        },
        
        layerColors: ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9'],
        colorIdx: 0,
        animId: null,
        
        init() {
            this.canvas = document.getElementById('canvas');
            this.ctx = this.canvas.getContext('2d', { willReadFrequently: this.state.settings.lowLatency });
            this.resize();
            window.addEventListener('resize', () => this.resize());
            
            this.setupUI();
            this.setupDrawing();
            this.setupKeyboard();
            this.loadState();
            
            // Create initial layer and frame
            this.addLayer('Background', true);
            this.addFrame();
            
            this.renderBrushes();
            this.renderLayers();
            this.renderTimeline();
            this.renderGallery();
            this.renderRecentColors();
            
            document.getElementById('s-size').textContent = `${this.canvas.width}×${this.canvas.height}`;
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 400);
            
            this.setStatus('Ready - Start drawing!');
        },
        
        resize() {
            // Save current canvas content
            const imgData = this.ctx ? this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height) : null;
            
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight - 24; // Status bar
            
            // Restore or fill background
            if (imgData) {
                this.ctx.putImageData(imgData, 0, 0);
            } else {
                this.ctx.fillStyle = this.state.canvas.bg;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }
        },
        
        setupUI() {
            // FABs
            document.querySelectorAll('.fab').forEach(fab => {
                this.makeDraggable(fab);
                if (fab.dataset.close) return;
                
                fab.addEventListener('click', (e) => {
                    if (this._isDragging) return;
                    const panel = fab.id.replace('btn-', 'panel-');
                    this.togglePanel(panel);
                });
            });
            
            // Panel close
            document.querySelectorAll('.panel-close').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
                    document.getElementById('sym-bar').classList.remove('open');
                });
            });
            
            // Brush sliders
            document.getElementById('b-size').addEventListener('input', e => {
                this.state.brush.size = +e.target.value;
                document.getElementById('b-size-v').textContent = e.target.value;
            });
            document.getElementById('b-opacity').addEventListener('input', e => {
                this.state.brush.opacity = +e.target.value;
                document.getElementById('b-opacity-v').textContent = e.target.value;
            });
            document.getElementById('b-hardness').addEventListener('input', e => {
                this.state.brush.hardness = +e.target.value;
                document.getElementById('b-hardness-v').textContent = e.target.value;
            });
            
            // Layer actions
            document.getElementById('add-layer').addEventListener('click', () => {
                this.addLayer();
                this.renderLayers();
                this.toast('Layer added');
            });
            
            // Timeline
            document.getElementById('tl-play').addEventListener('click', () => this.play());
            document.getElementById('tl-pause').addEventListener('click', () => { this.state.timeline.playing = false; });
            document.getElementById('tl-stop').addEventListener('click', () => this.stopAnim());
            document.getElementById('tl-add-frame').addEventListener('click', () => { this.addFrame(); this.toast('Frame added'); });
            document.getElementById('tl-keyframe').addEventListener('click', () => this.toggleKeyframe());
            document.getElementById('tl-fps').addEventListener('input', e => {
                this.state.timeline.fps = Math.max(1, Math.min(60, +e.target.value));
            });
            
            // Onion skin
            document.getElementById('o-prev').addEventListener('input', e => {
                this.state.onion.prev = +e.target.value;
                document.getElementById('o-prev-v').textContent = e.target.value;
            });
            document.getElementById('o-next').addEventListener('input', e => {
                this.state.onion.next = +e.target.value;
                document.getElementById('o-next-v').textContent = e.target.value;
            });
            document.getElementById('o-opacity').addEventListener('input', e => {
                this.state.onion.opacity = +e.target.value;
                document.getElementById('o-opacity-v').textContent = e.target.value;
            });
            
            // Gallery
            document.getElementById('new-canvas').addEventListener('click', () => this.newCanvas());
            
            // Settings
            document.getElementById('s-pen').addEventListener('change', e => this.state.settings.penOnly = e.target.checked);
            document.getElementById('s-latency').addEventListener('change', e => {
                this.state.settings.lowLatency = e.target.checked;
                if (this.ctx) this.ctx.willReadFrequently = e.target.checked;
            });
            document.getElementById('s-bg').addEventListener('input', e => {
                this.state.canvas.bg = e.target.value;
                const bg = this.state.layers.find(l => l.name === 'Background');
                if (bg) {
                    bg.ctx.fillStyle = e.target.value;
                    bg.ctx.fillRect(0, 0, bg.canvas.width, bg.canvas.height);
                    this.composite();
                }
            });
            
            // Export
            document.getElementById('exp-png').addEventListener('click', () => this.export('png'));
            document.getElementById('exp-jpg').addEventListener('click', () => this.export('jpg'));
            document.getElementById('exp-gif').addEventListener('click', () => this.export('gif'));
            
            // Undo/Redo/New
            document.getElementById('btn-undo').addEventListener('click', () => this.undo());
            document.getElementById('btn-redo').addEventListener('click', () => this.redo());
            document.getElementById('btn-new').addEventListener('click', () => this.newCanvas());
            
            // Color picker
            const colorFab = document.getElementById('color-fab');
            const colorPanel = document.getElementById('color-panel');
            colorFab.addEventListener('click', () => colorPanel.classList.toggle('open'));
            
            document.getElementById('color-input').addEventListener('input', e => {
                this.state.brush.color = e.target.value;
                colorFab.style.background = e.target.value;
                document.getElementById('color-preview').style.background = e.target.value;
                document.getElementById('color-hex').value = e.target.value;
                this.addRecentColor(e.target.value);
            });
            
            document.getElementById('color-hex').addEventListener('change', e => {
                let hex = e.target.value;
                if (!hex.startsWith('#')) hex = '#' + hex;
                if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                    this.state.brush.color = hex;
                    colorFab.style.background = hex;
                    document.getElementById('color-preview').style.background = hex;
                    document.getElementById('color-input').value = hex;
                    this.addRecentColor(hex);
                }
            });
            
            // Symmetry
            document.querySelectorAll('.sym-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    this.state.symmetry = btn.dataset.sym;
                    document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.composite();
                });
            });
            
            document.getElementById('btn-symmetry').addEventListener('click', () => {
                document.getElementById('sym-bar').classList.toggle('open');
                document.querySelectorAll('.panel.open').forEach(p => {
                    if (p !== document.getElementById('panel-symmetry')) p.classList.remove('open');
                });
            });
            
            // Close panels when clicking canvas
            this.canvas.addEventListener('mousedown', (e) => {
                if (e.target === this.canvas) {
                    document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
                    document.getElementById('sym-bar').classList.remove('open');
                    document.getElementById('color-panel').classList.remove('open');
                }
            });
        },
        
        makeDraggable(el) {
            let dragging = false, startX, startY, origX, origY;
            
            el.addEventListener('pointerdown', (e) => {
                if (e.target.closest('button, input, .brush-item, .layer-item, .frame-cell, .sym-btn')) return;
                dragging = false;
                startX = e.clientX; startY = e.clientY;
                const r = el.getBoundingClientRect();
                origX = r.left; origY = r.top;
                el.style.zIndex = 300;
                el.style.transition = 'none';
                e.preventDefault();
                
                const move = (ev) => {
                    if (Math.abs(ev.clientX - startX) > 3 || Math.abs(ev.clientY - startY) > 3) {
                        dragging = true;
                        this._isDragging = true;
                        el.style.left = (origX + ev.clientX - startX) + 'px';
                        el.style.top = (origY + ev.clientY - startY) + 'px';
                        el.style.right = 'auto'; el.style.bottom = 'auto';
                    }
                };
                
                const up = () => {
                    document.removeEventListener('pointermove', move);
                    document.removeEventListener('pointerup', up);
                    el.style.zIndex = '';
                    el.style.transition = '';
                    setTimeout(() => { this._isDragging = false; }, 100);
                    this.saveState();
                };
                
                document.addEventListener('pointermove', move);
                document.addEventListener('pointerup', up);
            });
        },
        
        togglePanel(id) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.contains('open');
            
            document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
            document.getElementById('sym-bar').classList.remove('open');
            document.getElementById('color-panel').classList.remove('open');
            
            if (!isOpen) panel.classList.add('open');
        },
        
        setupDrawing() {
            const c = this.canvas;
            
            c.addEventListener('pointerdown', (e) => {
                if (this.state.settings.penOnly && e.pointerType !== 'pen') return;
                this.state.isDrawing = true;
                const pos = this.getPos(e);
                this.state.stroke = [pos];
                
                // Draw dot for single click
                this.drawSegment(pos, pos);
            });
            
            c.addEventListener('pointermove', (e) => {
                if (!this.state.isDrawing) return;
                const pos = this.getPos(e);
                const prev = this.state.stroke[this.state.stroke.length - 1];
                this.drawSegment(prev, pos);
                this.state.stroke.push(pos);
            });
            
            const endDraw = () => {
                if (this.state.isDrawing) {
                    this.state.isDrawing = false;
                    this.state.undo.push([...this.state.stroke]);
                    this.state.redo = [];
                    this.state.stroke = [];
                    this.saveFrameState();
                }
            };
            
            c.addEventListener('pointerup', endDraw);
            c.addEventListener('pointerleave', endDraw);
            c.addEventListener('pointercancel', endDraw);
        },
        
        getPos(e) {
            const r = this.canvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        },
        
        drawSegment(from, to) {
            const layer = this.getActiveLayer();
            if (!layer || !layer.visible) return;
            
            const ctx = layer.ctx;
            const b = this.state.brush;
            const brushDef = this.brushes[b.type] || this.brushes.pencil;
            
            ctx.save();
            ctx.globalAlpha = b.opacity / 100;
            ctx.globalCompositeOperation = brushDef.mode;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (b.type === 'airbrush') {
                const grad = ctx.createRadialGradient(to.x, to.y, 0, to.x, to.y, b.size);
                grad.addColorStop(0, b.color);
                grad.addColorStop(0.6, b.color + '88');
                grad.addColorStop(1, b.color + '00');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(to.x, to.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            } else if (b.type === 'eraser') {
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = b.size;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
            } else {
                ctx.strokeStyle = b.color;
                ctx.lineWidth = b.size;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
            }
            
            ctx.restore();
            this.composite();
        },
        
        addLayer(name = null, isBg = false) {
            const id = 'l_' + Date.now();
            const offscreen = document.createElement('canvas');
            offscreen.width = this.canvas.width;
            offscreen.height = this.canvas.height;
            const ctx = offscreen.getContext('2d');
            
            const color = this.layerColors[this.colorIdx % this.layerColors.length];
            this.colorIdx++;
            
            if (isBg) {
                ctx.fillStyle = this.state.canvas.bg;
                ctx.fillRect(0, 0, offscreen.width, offscreen.height);
            }
            
            const layer = {
                id,
                name: name || `Layer ${this.state.layers.length + 1}`,
                visible: true,
                opacity: 100,
                color,
                canvas: offscreen,
                ctx
            };
            
            this.state.layers.push(layer);
            this.state.activeLayer = id;
            return layer;
        },
        
        getActiveLayer() {
            return this.state.layers.find(l => l.id === this.state.activeLayer);
        },
        
        renderLayers() {
            const list = document.getElementById('layers-list');
            list.innerHTML = '';
            
            [...this.state.layers].reverse().forEach(layer => {
                const el = document.createElement('div');
                el.className = 'layer-item' + (layer.id === this.state.activeLayer ? ' active' : '');
                el.innerHTML = `
                    <div class="layer-swatch" style="background:${layer.color}"></div>
                    <div class="layer-info">
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-opacity">${layer.opacity}%</div>
                    </div>
                    <div class="layer-btns">
                        <button class="layer-btn ${layer.visible ? 'vis' : ''}" data-vis="${layer.id}">${layer.visible ? '👁️' : '🚫'}</button>
                        <button class="layer-btn" data-del="${layer.id}">🗑️</button>
                    </div>
                `;
                el.onclick = (e) => {
                    if (e.target.closest('[data-vis]') || e.target.closest('[data-del]')) return;
                    this.state.activeLayer = layer.id;
                    this.renderLayers();
                };
                list.appendChild(el);
            });
            
            // Event listeners for layer buttons
            list.querySelectorAll('[data-vis]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const l = this.state.layers.find(x => x.id === btn.dataset.vis);
                    if (l) { l.visible = !l.visible; this.renderLayers(); this.composite(); }
                };
            });
            list.querySelectorAll('[data-del]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    if (this.state.layers.length <= 1) return this.toast('Cannot delete last layer');
                    this.state.layers = this.state.layers.filter(x => x.id !== btn.dataset.del);
                    if (this.state.activeLayer === btn.dataset.del) {
                        this.state.activeLayer = this.state.layers[this.state.layers.length - 1]?.id;
                    }
                    this.renderLayers();
                    this.composite();
                };
            });
        },
        
        composite() {
            // Clear main canvas
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            
            // Draw onion skin
            this.drawOnion();
            
            // Composite layers
            this.state.layers.forEach(layer => {
                if (layer.visible) {
                    this.ctx.save();
                    this.ctx.globalAlpha = layer.opacity / 100;
                    this.ctx.drawImage(layer.canvas, 0, 0);
                    this.ctx.restore();
                }
            });
            
            // Draw symmetry guides
            this.drawSymGuides();
        },
        
        drawOnion() {
            if (!this.state.onion.prev && !this.state.onion.next) return;
            
            const frames = this.state.timeline.frames;
            const current = this.state.timeline.current;
            
            // Previous frames
            for (let i = 1; i <= this.state.onion.prev; i++) {
                const idx = current - i;
                if (idx < 0 || !frames[idx]) continue;
                const alpha = (this.state.onion.opacity / 100) * (1 - i / (this.state.onion.prev + 1));
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.filter = 'saturate(2)';
                this.ctx.drawImage(frames[idx], 0, 0);
                this.ctx.restore();
            }
            
            // Next frames
            for (let i = 1; i <= this.state.onion.next; i++) {
                const idx = current + i;
                if (idx >= frames.length || !frames[idx]) continue;
                const alpha = (this.state.onion.opacity / 100) * (1 - i / (this.state.onion.next + 1));
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.filter = 'hue-rotate(180deg) saturate(2)';
                this.ctx.drawImage(frames[idx], 0, 0);
                this.ctx.restore();
            }
        },
        
        drawSymGuides() {
            if (this.state.symmetry === 'none') return;
            const ctx = this.ctx;
            ctx.save();
            ctx.strokeStyle = 'rgba(155, 89, 182, 0.25)';
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 6]);
            
            const cx = this.canvas.width / 2;
            const cy = this.canvas.height / 2;
            
            if (this.state.symmetry === 'h' || this.state.symmetry === 'quad') {
                ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, this.canvas.height); ctx.stroke();
            }
            if (this.state.symmetry === 'v' || this.state.symmetry === 'quad') {
                ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(this.canvas.width, cy); ctx.stroke();
            }
            if (this.state.symmetry.startsWith('rad') || this.state.symmetry === 'mandala') {
                const n = { rad4: 4, rad6: 6, rad8: 8, mandala: 12 }[this.state.symmetry];
                for (let i = 0; i < n; i++) {
                    const angle = (i * 360 / n) * Math.PI / 180;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle) * this.canvas.width, cy + Math.sin(angle) * this.canvas.height);
                    ctx.stroke();
                }
            }
            ctx.restore();
        },
        
        addFrame() {
            // Capture current state
            const frame = document.createElement('canvas');
            frame.width = this.canvas.width;
            frame.height = this.canvas.height;
            const fctx = frame.getContext('2d');
            
            // Composite all layers
            this.state.layers.forEach(l => {
                if (l.visible) {
                    fctx.globalAlpha = l.opacity / 100;
                    fctx.drawImage(l.canvas, 0, 0);
                }
            });
            
            this.state.timeline.frames.push({
                canvas: frame,
                keyframe: false,
                layerStates: this.state.layers.map(l => ({
                    id: l.id, name: l.name, visible: l.visible,
                    opacity: l.opacity, color: l.color
                }))
            });
            
            this.state.timeline.current = this.state.timeline.frames.length - 1;
            this.renderTimeline();
        },
        
        saveFrameState() {
            const frames = this.state.timeline.frames;
            if (frames.length === 0) return;
            
            const idx = this.state.timeline.current;
            if (!frames[idx]) return;
            
            const fctx = frames[idx].canvas.getContext('2d');
            fctx.clearRect(0, 0, frames[idx].canvas.width, frames[idx].canvas.height);
            
            this.state.layers.forEach(l => {
                if (l.visible) {
                    fctx.globalAlpha = l.opacity / 100;
                    fctx.drawImage(l.canvas, 0, 0);
                }
            });
        },
        
        loadFrame(idx) {
            const frame = this.state.timeline.frames[idx];
            if (!frame) return;
            
            // Clear layers
            this.state.layers.forEach(l => {
                l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height);
            });
            
            // Restore layer states
            if (frame.layerStates) {
                frame.layerStates.forEach(fs => {
                    const l = this.state.layers.find(x => x.id === fs.id);
                    if (l) { l.visible = fs.visible; l.opacity = fs.opacity; }
                });
            }
            
            // Draw frame content to active layer
            const active = this.getActiveLayer();
            if (active) {
                active.ctx.drawImage(frame.canvas, 0, 0);
            }
            
            this.renderLayers();
            this.composite();
        },
        
        renderTimeline() {
            const row = document.getElementById('frames-row');
            row.innerHTML = '';
            
            this.state.timeline.frames.forEach((frame, i) => {
                const el = document.createElement('div');
                el.className = 'frame-cell' + 
                    (i === this.state.timeline.current ? ' active' : '') +
                    (frame.keyframe ? ' keyframe' : '');
                el.textContent = i + 1;
                el.onclick = () => {
                    this.saveFrameState();
                    this.state.timeline.current = i;
                    this.renderTimeline();
                    this.loadFrame(i);
                };
                row.appendChild(el);
            });
            
            const active = row.querySelector('.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        },
        
        toggleKeyframe() {
            const frames = this.state.timeline.frames;
            const idx = this.state.timeline.current;
            if (frames[idx]) {
                frames[idx].keyframe = !frames[idx].keyframe;
                this.renderTimeline();
                this.toast(frames[idx].keyframe ? 'Keyframe set' : 'Keyframe removed');
            }
        },
        
        play() {
            if (this.state.timeline.playing || this.state.timeline.frames.length < 2) return;
            this.state.timeline.playing = true;
            document.getElementById('tl-play').classList.add('active');
            
            const fps = this.state.timeline.fps;
            let idx = this.state.timeline.current;
            
            this.animId = setInterval(() => {
                if (!this.state.timeline.playing) return;
                
                idx++;
                if (idx >= this.state.timeline.frames.length) idx = 0;
                
                this.state.timeline.current = idx;
                this.saveFrameState();
                this.loadFrame(idx);
                this.renderTimeline();
            }, 1000 / fps);
        },
        
        stopAnim() {
            this.state.timeline.playing = false;
            document.getElementById('tl-play').classList.remove('active');
            if (this.animId) { clearInterval(this.animId); this.animId = null; }
            this.state.timeline.current = 0;
            this.renderTimeline();
        },
        
        renderBrushes() {
            const grid = document.getElementById('brush-grid');
            grid.innerHTML = '';
            
            Object.entries(this.brushes).forEach(([id, b]) => {
                const el = document.createElement('div');
                el.className = 'brush-item' + (id === this.state.brush.type ? ' active' : '');
                el.innerHTML = `<span class="b-icon">${b.icon}</span><span class="b-name">${b.name}</span>`;
                el.onclick = () => {
                    this.state.brush.type = id;
                    this.renderBrushes();
                };
                grid.appendChild(el);
            });
        },
        
        undo() {
            if (this.state.undo.length === 0) return;
            const last = this.state.undo.pop();
            this.state.redo.push(last);
            this.toast('Undo');
        },
        
        redo() {
            if (this.state.redo.length === 0) return;
            const last = this.state.redo.pop();
            this.state.undo.push(last);
            this.toast('Redo');
        },
        
        newCanvas() {
            // Save to gallery
            this.saveToGallery();
            
            // Clear everything
            this.state.layers = [];
            this.state.undo = [];
            this.state.redo = [];
            this.state.timeline = { frames: [], current: 0, fps: 12, playing: false };
            this.colorIdx = 0;
            
            // Recreate
            this.addLayer('Background', true);
            this.addFrame();
            this.renderLayers();
            this.renderTimeline();
            this.composite();
            
            // Close panels
            document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
            document.getElementById('sym-bar').classList.remove('open');
            
            this.toast('New canvas created');
            this.setStatus('New canvas ready');
        },
        
        saveToGallery() {
            const hasContent = this.state.layers.some(l => {
                try {
                    return l.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height).data.some(v => v !== 0);
                } catch { return false; }
            });
            
            if (!hasContent) return;
            
            const thumb = document.createElement('canvas');
            thumb.width = 200; thumb.height = 120;
            const tctx = thumb.getContext('2d');
            
            this.state.layers.forEach(l => {
                if (l.visible) {
                    tctx.globalAlpha = l.opacity / 100;
                    tctx.drawImage(l.canvas, 0, 0, 200, 120);
                }
            });
            
            this.state.gallery.push({
                id: 'g_' + Date.now(),
                thumb: thumb.toDataURL(),
                date: new Date().toLocaleString(),
                layers: this.state.layers.length,
                frames: this.state.timeline.frames.length
            });
            
            this.renderGallery();
        },
        
        renderGallery() {
            const list = document.getElementById('gallery-list');
            if (!list) return;
            list.innerHTML = '';
            
            this.state.gallery.forEach(item => {
                const el = document.createElement('div');
                el.className = 'gallery-item';
                el.innerHTML = `
                    <div class="gallery-thumb"><img src="${item.thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"></div>
                    <div class="gallery-meta">
                        <div class="name">${item.date}</div>
                        <div class="info">${item.layers}L · ${item.frames}F</div>
                    </div>
                `;
                list.appendChild(el);
            });
        },
        
        export(format) {
            const comp = document.createElement('canvas');
            comp.width = this.canvas.width;
            comp.height = this.canvas.height;
            const cctx = comp.getContext('2d');
            
            if (format === 'jpg') {
                cctx.fillStyle = this.state.canvas.bg;
                cctx.fillRect(0, 0, comp.width, comp.height);
            }
            
            this.state.layers.forEach(l => {
                if (l.visible) {
                    cctx.globalAlpha = l.opacity / 100;
                    cctx.drawImage(l.canvas, 0, 0);
                }
            });
            
            const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
            const ext = format === 'jpg' ? 'jpg' : format;
            const quality = format === 'jpg' ? 0.95 : undefined;
            
            comp.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `socreate_${Date.now()}.${ext}`;
                a.click();
                URL.revokeObjectURL(url);
                this.toast(`Exported as ${ext.toUpperCase()}`);
            }, mime, quality);
        },
        
        renderRecentColors() {
            const container = document.getElementById('recent-colors');
            container.innerHTML = '';
            this.state.recentColors.forEach(c => {
                const el = document.createElement('div');
                el.className = 'recent-swatch';
                el.style.background = c;
                el.onclick = () => {
                    this.state.brush.color = c;
                    document.getElementById('color-input').value = c;
                    document.getElementById('color-preview').style.background = c;
                    document.getElementById('color-hex').value = c;
                    document.getElementById('color-fab').style.background = c;
                };
                container.appendChild(el);
            });
        },
        
        addRecentColor(color) {
            if (!this.state.recentColors.includes(color)) {
                this.state.recentColors.unshift(color);
                if (this.state.recentColors.length > 12) this.state.recentColors.pop();
                this.renderRecentColors();
            }
        },
        
        setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); this.undo(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); this.redo(); }
                if (e.ctrlKey && e.shiftKey && e.key === 'z') { e.preventDefault(); this.redo(); }
                if (e.key === 'b') this.state.brush.type = 'brush';
                if (e.key === 'e') this.state.brush.type = 'eraser';
                if (e.key === 'p') this.state.brush.type = 'pencil';
                if (e.key === ' ') { e.preventDefault(); this.state.timeline.playing ? this.stopAnim() : this.play(); }
                if (e.key === 'n') { this.addFrame(); this.toast('Frame added'); }
                if (e.key === 'Delete') {
                    const f = this.state.timeline.frames;
                    if (f.length > 1) {
                        f.splice(this.state.timeline.current, 1);
                        if (this.state.timeline.current >= f.length) this.state.timeline.current = Math.max(0, f.length - 1);
                        this.renderTimeline();
                        this.toast('Frame deleted');
                    }
                }
            });
            
            // Touch gestures
            let lastTap = 0;
            document.addEventListener('touchend', (e) => {
                if (e.touches.length === 0 && e.changedTouches.length >= 2) {
                    const now = Date.now();
                    if (e.changedTouches.length === 2 && now - lastTap < 400) this.undo();
                    if (e.changedTouches.length === 3) this.redo();
                    if (e.changedTouches.length === 4) {
                        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
                        else document.exitFullscreen?.();
                    }
                    lastTap = now;
                }
            });
        },
        
        loadState() {
            try {
                const saved = localStorage.getItem('socreate_web');
                if (saved) {
                    const s = JSON.parse(saved);
                    if (s.brush) Object.assign(this.state.brush, s.brush);
                    if (s.symmetry) this.state.symmetry = s.symmetry;
                    if (s.settings) Object.assign(this.state.settings, s.settings);
                    if (s.recentColors) this.state.recentColors = s.recentColors;
                    if (s.gallery) this.state.gallery = s.gallery;
                }
            } catch (e) { console.warn('Failed to load state:', e); }
        },
        
        saveState() {
            try {
                localStorage.setItem('socreate_web', JSON.stringify({
                    brush: this.state.brush,
                    symmetry: this.state.symmetry,
                    settings: this.state.settings,
                    recentColors: this.state.recentColors,
                    gallery: this.state.gallery
                }));
            } catch (e) { console.warn('Failed to save state:', e); }
        },
        
        toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        },
        
        setStatus(msg) {
            document.getElementById('status-left').textContent = msg;
        }
    };
    
    // Initialize
    window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
