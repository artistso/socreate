name: SoCreate CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: 35
  NODE_VERSION: '20'

jobs:
  # ===== WEB BUILD =====
  web-build:
    name: Build Web Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npx tsc --noEmit
        
      - name: Build production
        run: npm run build
        
      - name: Verify build output
        run: |
          if [ -f "dist/index.html" ] && [ -s "dist/index.html" ]; then
            echo "✅ Web build successful: $(du -sh dist/index.html | cut -f1)"
          else
            echo "❌ Build output missing"
            exit 1
          fi
          
      - name: Create npm package
        run: npm pack
        
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            web/dist/
            web/*.tgz
          retention-days: 30

  # ===== ANDROID BUILD =====
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ===== DEPLOY TO GITHUB PAGES =====
  deploy-web:
    name: Deploy Web to GitHub Pages
    needs: web-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-dist
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist/web/dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===== CREATE RELEASE =====
  create-release:
    name: Create Release with Packages
    needs: [web-build, android-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    
    steps:
      - name: Download web package
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: release-web
          
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: release-apk
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-web/web/*.tgz
            release-apk/*.apk
