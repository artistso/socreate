name: Build SoCreate APK

# ──────────────────────────────────────────────────────────────────────
# SoCreate CI/CD — Cloud Build Pipeline
# Developer: Steven Michael Allen Owens (@SoQuarky)
# Company: AdventuresInDrawing
# Brands: Soquarky · FunFYP · FPY.Lovely · Soquarky.Click
#
# This workflow builds debug and release APKs whenever you push code.
# APKs are available as downloadable artifacts in the Actions tab.
#
# For release builds, add these secrets in GitHub:
#   Settings → Secrets and variables → Actions → New repository secret
#   - KEYSTORE_BASE64  (base64 of your .jks file)
#   - KEYSTORE_PASSWORD
#   - KEY_ALIAS
#   - KEY_PASSWORD
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: socreate-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ─── Release Build (only on main branch with secrets set) ────────

      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/socreate-release.jks

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "storeFile=socreate-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          ./gradlew assembleRelease

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Build Release AAB (for Play Store)
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew bundleRelease

      - name: Upload Release AAB
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90
