name: Build SoCreate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (capture output)
        run: |
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-output.log
        continue-on-error: true

      - name: Upload build output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: build-output.log
          retention-days: 7

      - name: Upload Debug APK (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: socreate-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-release:
    name: Build Release APK + AAB
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/socreate-release.jks
          else
            echo "No keystore secret — skipping release build"
          fi

      - name: Create keystore.properties
        run: |
          echo "storeFile=socreate-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee release-build.log
        continue-on-error: true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace 2>&1 | tee aab-build.log
        continue-on-error: true

      - name: Upload Release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload release build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: |
            release-build.log
            aab-build.log
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace 2>&1 | tee test-output.log
        continue-on-error: true

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-log
          path: test-output.log
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 14
